name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 30
        build-tools: 30.0.3
        ndk-version: 21.4.7075529
    
    - name: Install dependencies
      run: |
        npm install -g @nativescript/cli
        npm install
    
    - name: Add Android platform
      run: ns platform add android
    
    - name: Build Android APK
      run: |
        ns build android --release --key-store-path android.keystore --key-store-password password --key-store-alias alias --key-store-alias-password password --copy-to ./disney-plus-streaming-app.apk
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: disney-plus-streaming-app
        path: disney-plus-streaming-app.apk